<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AL-MUBIN PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #10b981; --bg: #020617; --card: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .bold-header { font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }
        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: var(--p) !important; }
        .active { background: #10b981 !important; color: white !important; }
    </style>
</head>
<body class="pb-28">

    <header class="p-6 flex justify-between items-center sticky top-0 z-[60] bg-[#020617]/90 backdrop-blur-md">
        <div>
            <h1 class="bold-header text-2xl tracking-widest">AL-MUBIN <span class="text-emerald-500">PRO</span></h1>
            <button onclick="shareApp()" style="background: #10b981; border: none; color: white; border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; font-weight: bold; margin-top: 5px;">Share 📲</button>
        </div>
        <div class="text-right">
            <p id="top-time" class="bold-header text-xl">00:00</p>
            <p id="hijri-date" class="text-[10px] text-emerald-500 uppercase tracking-widest">Loading...</p>
        </div>
    </header>

    <main id="home" class="page active px-6">
        <div class="py-12 text-center">
            <h2 id="main-clock" class="text-8xl font-bold mb-2">00:00</h2>
            <p class="text-emerald-500 font-bold uppercase tracking-widest">Next: Isha Prayer • 7:55 PM</p>
        </div>

        <div class="glass p-6 mb-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="bold-header text-lg">Daily Prayers</h3>
                <span id="prayer-stats" class="text-emerald-500 text-sm font-bold">0/5</span>
            </div>
            <div class="flex justify-between">
                <button id="fajr-check" onclick="togglePrayer(this)" class="w-12 h-12 rounded-full border-2 border-emerald-500/20 flex items-center justify-center font-bold transition-all">F</button>
                <button id="dhuhr-check" onclick="togglePrayer(this)" class="w-12 h-12 rounded-full border-2 border-emerald-500/20 flex items-center justify-center font-bold transition-all">D</button>
                <button id="asr-check" onclick="togglePrayer(this)" class="w-12 h-12 rounded-full border-2 border-emerald-500/20 flex items-center justify-center font-bold transition-all">A</button>
                <button id="maghrib-check" onclick="togglePrayer(this)" class="w-12 h-12 rounded-full border-2 border-emerald-500/20 flex items-center justify-center font-bold transition-all">M</button>
                <button id="isha-check" onclick="togglePrayer(this)" class="w-12 h-12 rounded-full border-2 border-emerald-500/20 flex items-center justify-center font-bold transition-all">I</button>
            </div>
        </div>

        <div class="glass p-4 text-center mb-8">
            <p class="text-gray-400 text-xs uppercase tracking-widest mb-1">Last Read Surah</p>
            <h4 id="last-read" class="text-emerald-500 font-bold text-lg">NONE</h4>
        </div>
    </main>

    <main id="tasbeeh" class="page px-6">
        <div class="glass p-8 text-center mt-10">
            <p class="text-emerald-500 font-bold uppercase tracking-widest mb-4">Tasbeeh Counter</p>
            <h2 id="count" class="text-9xl font-bold mb-10">0</h2>
            <button onclick="increment()" class="w-full py-8 bg-emerald-500 rounded-2xl font-black text-3xl shadow-lg shadow-emerald-500/20 active:scale-95 transition-transform">COUNT</button>
            <button onclick="resetCounter()" class="mt-8 text-gray-500 uppercase tracking-widest text-xs font-bold">Reset Counter</button>
        </div>
    </main>

    <main id="quran" class="page px-6">
        <div class="grid gap-3 mt-4" id="surah-list">
            </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#020617]/95 backdrop-blur-xl border-t border-white/5 p-4 z-[100]">
        <div class="flex justify-around items-center max-w-md mx-auto">
            <button onclick="showPage('home')" class="nav-btn nav-active flex flex-col items-center gap-1">
                <i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold">HOME</span>
            </button>
            <button onclick="showPage('quran')" class="nav-btn flex flex-col items-center gap-1 text-gray-500">
                <i class="fa-solid fa-book-quran text-xl"></i><span class="text-[10px] font-bold">QURAN</span>
            </button>
            <button onclick="showPage('tasbeeh')" class="nav-btn flex flex-col items-center gap-1 text-gray-500">
                <i class="fa-solid fa-circle-dot text-xl"></i><span class="text-[10px] font-bold">DHIKR</span>
            </button>
        </div>
    </nav>

    <script>
        // Pages Navigation
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            event.currentTarget.classList.add('nav-active');
        }

        // Tasbeeh Logic
        function increment() {
            const c = document.getElementById('count');
            c.innerText = parseInt(c.innerText) + 1;
        }
        function resetCounter() { document.getElementById('count').innerText = '0'; }

        // Prayer Tracker Logic
        function togglePrayer(btn) {
            btn.classList.toggle('active');
            updatePrayerStats();
        }
        function updatePrayerStats() {
            const activeCount = document.querySelectorAll('.w-12.active').length;
            document.getElementById('prayer-stats').innerText = activeCount + '/5';
        }

        // Quran List Generator
        const surahs = ["Al-Fatihah", "Al-Baqarah", "Al-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf", "Al-Anfal"];
        const list = document.getElementById('surah-list');
        surahs.forEach((name, i) => {
            const div = document.createElement('div');
            div.className = "glass p-4 flex justify-between items-center cursor-pointer";
            div.innerHTML = `<div><span class="text-emerald-500 font-bold mr-3">${i+1}</span><span class="font-bold">${name}</span></div><i class="fa-solid fa-play text-xs text-gray-600"></i>`;
            div.onclick = () => {
                document.getElementById('last-read').innerText = name;
                showPage('home');
            };
            list.appendChild(div);
        });

        // MEMORY (SAVE & LOAD)
        function saveData() {
            const data = {
                dhikr: document.getElementById('count').innerText,
                lastRead: document.getElementById('last-read').innerText,
                fajr: document.getElementById('fajr-check').classList.contains('active'),
                dhuhr: document.getElementById('dhuhr-check').classList.contains('active'),
                asr: document.getElementById('asr-check').classList.contains('active'),
                maghrib: document.getElementById('maghrib-check').classList.contains('active'),
                isha: document.getElementById('isha-check').classList.contains('active')
            };
            localStorage.setItem('alMubinData', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('alMubinData');
            if (saved) {
                const data = JSON.parse(saved);
                if(data.dhikr) document.getElementById('count').innerText = data.dhikr;
                if(data.lastRead) document.getElementById('last-read').innerText = data.lastRead;
                if(data.fajr) { document.getElementById('fajr-check').classList.add('active'); }
                if(data.dhuhr) { document.getElementById('dhuhr-check').classList.add('active'); }
                if(data.asr) { document.getElementById('asr-check').classList.add('active'); }
                if(data.maghrib) { document.getElementById('maghrib-check').classList.add('active'); }
                if(data.isha) { document.getElementById('isha-check').classList.add('active'); }
                updatePrayerStats();
            }
        }

        // Share App
        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: 'AL-MUBIN PRO', text: 'My Islamic Planner App', url: window.location.href });
            }
        }

        // Clock & Date
        setInterval(() => {
            const d = new Date();
            const time = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
            document.getElementById('top-time').innerText = time;
            document.getElementById('main-clock').innerText = time;
        }, 1000);
        document.getElementById('hijri-date').innerText = new Intl.DateTimeFormat('en-u-ca-islamic-uma', {day:'numeric', month:'long', year:'numeric'}).format(new Date());

        // Init
        loadData();
        setInterval(saveData, 2000); // Auto-save every 2s
    </script>
</body>
</html>
